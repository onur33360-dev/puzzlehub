<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Güncelleniyor...</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0a1e;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;padding:20px}
.spinner{width:48px;height:48px;border:4px solid rgba(168,85,247,.2);border-top-color:#a855f7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
h2{font-size:18px;color:#c084fc;text-align:center}
p{font-size:14px;color:#9a9ab0;text-align:center;max-width:300px;line-height:1.6}
.log{font-size:12px;color:#6b7280;max-width:300px;text-align:left;background:rgba(255,255,255,.03);padding:12px;border-radius:8px;width:100%;max-height:200px;overflow-y:auto}
.done{color:#22c55e;font-size:20px;font-weight:700}
</style></head><body>
<div class="spinner" id="sp"></div>
<h2 id="title">🔄 Güncelleniyor...</h2>
<p id="msg">Eski cache temizleniyor ve yeni dosyalar indiriliyor.</p>
<div class="log" id="log"></div>
<script>
(async function() {
  const title = document.getElementById('title');
  const msg = document.getElementById('msg');
  const sp = document.getElementById('sp');
  const log = document.getElementById('log');
  
  function addLog(text) {
    log.textContent += text + '\n';
    log.scrollTop = log.scrollHeight;
  }
  
  let steps = 0;
  
  // 1. Tüm Service Worker'ları kaldır
  addLog('🔍 Service Worker kontrol...');
  if ('serviceWorker' in navigator) {
    const regs = await navigator.serviceWorker.getRegistrations();
    addLog(`   ${regs.length} SW bulundu`);
    for (const r of regs) {
      await r.unregister();
      steps++;
      addLog(`   ✅ SW silindi: ${r.scope}`);
    }
  } else {
    addLog('   ℹ️ SW desteklenmiyor');
  }
  
  // 2. Tüm cache'leri sil
  addLog('🗑️ Cache temizleniyor...');
  if ('caches' in window) {
    const keys = await caches.keys();
    addLog(`   ${keys.length} cache bulundu`);
    for (const k of keys) {
      await caches.delete(k);
      steps++;
      addLog(`   ✅ Silindi: ${k}`);
    }
  }
  
  // 3. Tüm dosyaları cache-bypass ile zorla indir
  addLog('📥 Dosyalar zorla yeniden indiriliyor...');
  const files = ['index.html', 'app.js', 'games.js', 'reels.js', 'style.css', 'sw.js'];
  for (const f of files) {
    try {
      const resp = await fetch(f + '?force=' + Date.now(), { 
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache' }
      });
      if (resp.ok) {
        const size = (await resp.text()).length;
        addLog(`   ✅ ${f} — ${(size/1024).toFixed(1)}KB yeniden indirildi`);
        steps++;
      } else {
        addLog(`   ⚠️ ${f} — HTTP ${resp.status}`);
      }
    } catch(e) {
      addLog(`   ❌ ${f} — ${e.message}`);
    }
  }

  // 4. SessionStorage temizle
  try { sessionStorage.clear(); addLog('✅ SessionStorage temizlendi'); } catch(e) {}
  
  addLog(`\n🎉 Toplam ${steps} işlem tamamlandı!`);
  
  title.textContent = '✅ Güncelleme Tamamlandı!';
  title.classList.add('done');
  msg.textContent = 'Sayfa 3 saniye içinde yeniden yüklenecek...';
  sp.style.display = 'none';
  
  // 5. Ana sayfaya yönlendir — tamamen temiz URL
  setTimeout(() => {
    window.location.replace('./index.html?updated=' + Date.now());
  }, 3000);
})();
</script>
</body></html>
